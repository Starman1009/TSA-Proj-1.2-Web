<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>TSA Proj 1.2</title>
    <script src="coi-serviceworker.min.js"></script>
    <style>
        html, body, #canvas {
            margin: 0;
            padding: 0;
            border: 0;
        }

        body {
            color: white;
            background-color: black;
            overflow: hidden;
            touch-action: none;
        }

        #canvas {
            display: block;
        }

        #canvas:focus {
            outline: none;
        }

        #status {
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            z-index: 10;
            opacity: 1;
        }

        #status-splash {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            margin: auto;
        }

        #status-progress {
            position: absolute;
            bottom: 15%;
            width: 50%;
            height: 12px;
            margin: 0 auto;
            z-index: 20;
            appearance: none;
            border: none;
        }

        #status-progress::-webkit-progress-bar {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
        }
        #status-progress::-webkit-progress-value {
            background-color: #ffffff;
            border-radius: 6px;
        }

        #youtube-link {
            position: absolute;
            bottom: 5%;
            z-index: 30;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 14px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        #youtube-link:hover {
            background-color: rgba(255, 0, 0, 0.7);
            color: white;
            border-color: white;
        }

        #status-notice {
            display: none;
            background-color: #5b3943;
            border-radius: 0.5rem;
            border: 1px solid #9b3943;
            color: #e0e0e0;
            font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
            line-height: 1.3;
            margin: 0 2rem;
            overflow: hidden;
            padding: 1rem;
            text-align: center;
            z-index: 40;
        }
    </style>
</head>
<body>
    <canvas id="canvas">
        Your browser does not support the canvas tag.
    </canvas>

    <noscript>
        Your browser does not support JavaScript.
    </noscript>

    <div id="status">
        <video id="status-splash" autoplay muted loop playsinline>
            <source src="Dream_14.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        
        <a id="youtube-link" href="https://youtu.be/2O0alk9oGoY?si=bfcNqOjJp9r05Aq4" target="_blank">
            Watch TSA Demonstration Video
        </a>

        <progress id="status-progress" value="0" max="100"></progress>
        <div id="status-notice"></div>
    </div>

    <script src="index.js"></script>
    <script>
        const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":false,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":28955172,"index.wasm":38034280},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
        const engine = new Engine(GODOT_CONFIG);

        (function () {
            const statusOverlay = document.getElementById('status');
            const statusProgress = document.getElementById('status-progress');
            const statusNotice = document.getElementById('status-notice');
            const video = document.getElementById('status-splash');

            let initializing = true;
            let statusMode = '';
            let actualProgress = 0;
            let displayedProgress = 0;
            let gameReady = false;

            function setStatusMode(mode) {
                if (statusMode === mode || !initializing) return;
                
                if (mode === 'hidden') {
                    gameReady = true;
                    return; 
                }

                statusOverlay.style.visibility = 'visible';
                statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
                statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
                
                if (mode === 'progress' && video) {
                    video.play().catch(err => console.log("Autoplay check:", err));
                }
                statusMode = mode;
            }

            function updateFakeProgress() {
                if (!initializing) return;

                // Smooth bar movement: interpolate displayed progress toward actual progress
                if (displayedProgress < actualProgress) {
                    displayedProgress += 0.5; 
                }

                statusProgress.value = displayedProgress;

                // Hide overlay only when Godot engine is ready AND progress bar visually hits 100%
                if (gameReady && displayedProgress >= 100) {
                    statusOverlay.style.transition = 'opacity 1.5s ease';
                    statusOverlay.style.opacity = '0';
                    setTimeout(() => {
                        statusOverlay.remove();
                    }, 1500);
                    initializing = false;
                } else {
                    requestAnimationFrame(updateFakeProgress);
                }
            }

            function setStatusNotice(text) {
                while (statusNotice.lastChild) {
                    statusNotice.removeChild(statusNotice.lastChild);
                }
                const lines = text.split('\n');
                lines.forEach((line) => {
                    statusNotice.appendChild(document.createTextNode(line));
                    statusNotice.appendChild(document.createElement('br'));
                });
            }

            function displayFailureNotice(err) {
                console.error(err);
                if (err instanceof Error) {
                    setStatusNotice(err.message);
                } else if (typeof err === 'string') {
                    setStatusNotice(err);
                } else {
                    setStatusNotice('An unknown error occurred.');
                }
                setStatusMode('notice');
                initializing = false;
            }

            const missing = Engine.getMissingFeatures();
            if (missing.length !== 0) {
                const missingMsg = 'Error\nRequired features missing:\n';
                displayFailureNotice(missingMsg + missing.join('\n'));
            } else {
                setStatusMode('progress');
                updateFakeProgress();

                engine.startGame({
                    'onProgress': function (current, total) {
                        if (total > 0) {
                            actualProgress = (current / total) * 100;
                        }
                    },
                }).then(() => {
                    setStatusMode('hidden');
                }, displayFailureNotice);
            }
        }());
    </script>
</body>
</html>
