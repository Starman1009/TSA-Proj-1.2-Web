<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>TSA Proj 1.2</title>
    <script src="https://cdn.jsdelivr.net/gh/gzuidhof/coi-serviceworker@latest/coi-serviceworker.min.js"></script>
    <style>
        html, body, #canvas {
            margin: 0;
            padding: 0;
            border: 0;
        }

        body {
            color: white;
            background-color: black;
            overflow: hidden;
            touch-action: none;
        }

        #canvas {
            display: block;
        }

        #canvas:focus {
            outline: none;
        }

        /* Startup Video Overlay */
        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 1s ease-out;
        }

        #startup-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Error/Status Box */
        #status-notice {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #5b3943;
            border-radius: 0.5rem;
            border: 1px solid #9b3943;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            padding: 1rem;
            text-align: center;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas">Your browser does not support the canvas tag.</canvas>

    <div id="video-container">
        <video id="startup-video" autoplay muted playsinline>
            <source src="Dream_14.mp4" type="video/mp4">
        </video>
    </div>

    <div id="status-notice"></div>

    <script src="index.js"></script>
    <script>
        const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":22407720,"index.wasm":38034280},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
        const engine = new Engine(GODOT_CONFIG);

        (function () {
            const videoContainer = document.getElementById('video-container');
            const startupVideo = document.getElementById('startup-video');
            const statusNotice = document.getElementById('status-notice');

            let videoFinished = false;
            let engineFinished = false;

            // This function checks if both requirements are met before showing the game
            function tryHideOverlay() {
                if (videoFinished && engineFinished) {
                    videoContainer.style.opacity = '0';
                    setTimeout(() => {
                        videoContainer.remove();
                        // Give focus to the game canvas
                        document.getElementById('canvas').focus();
                    }, 1000);
                }
            }

            function displayFailureNotice(err) {
                console.error(err);
                statusNotice.innerText = (err instanceof Error) ? err.message : err;
                statusNotice.style.display = 'block';
                videoContainer.style.display = 'none';
            }

            // Monitor Video Progress
            startupVideo.onended = () => {
                videoFinished = true;
                tryHideOverlay();
            };

            // Start Godot Loading
            engine.startGame({
                'onProgress': function (current, total) {
                    // Optional: You can log progress to console if needed
                },
            }).then(() => {
                engineFinished = true;
                tryHideOverlay();
            }, displayFailureNotice);
        }());
    </script>
</body>
</html>
