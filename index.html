<!DOCTYPE html>
<script src="coi-serviceworker.js"></script>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
        <title>TSA Proj 1.2</title>
        <style>
            html, body, #canvas { margin: 0; padding: 0; border: 0; width: 100%; height: 100%; }
            body { color: white; background-color: black; overflow: hidden; touch-action: none; }
            #canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
            #canvas:focus { outline: none; }
            
            #status { 
                position: absolute; top: 0; left: 0; right: 0; bottom: 0;
                background-color: #000000;
                display: flex; 
                flex-direction: column; justify-content: center; align-items: center; 
                visibility: visible; /* Changed to visible by default */
                z-index: 100;
            }

            #status-video {
                position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                object-fit: cover; 
                z-index: -1; /* Sits behind the progress bar */
                background-color: black;
            }

            #status-progress { 
                position: relative; bottom: -30%; width: 50%; 
                height: 12px; z-index: 101;
            }

            #status-notice { 
                display: none; background-color: #5b3943; border-radius: 0.5rem; 
                padding: 1rem; text-align: center; z-index: 102; 
                font-family: sans-serif;
            }
        </style>
    </head>
    <body>
        <canvas id="canvas">Your browser does not support the canvas tag.</canvas>

        <div id="status">
            <video id="status-video" autoplay muted loop playsinline preload="auto">
                <source src="Dream_14.mp4" type="video/mp4">
            </video>
            <progress id="status-progress"></progress>
            <div id="status-notice"></div>
        </div>

        <script src="index.js"></script>
        <script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":false,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":10199996,"index.wasm":36145869},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const engine = new Engine(GODOT_CONFIG);

(function () {
    const statusOverlay = document.getElementById('status');
    const statusProgress = document.getElementById('status-progress');
    const statusNotice = document.getElementById('status-notice');
    const statusVideo = document.getElementById('status-video');

    // FORCE VIDEO PLAYBACK
    if (statusVideo) {
        statusVideo.muted = true; // Essential for Chrome/Safari autoplay
        const playPromise = statusVideo.play();
        if (playPromise !== undefined) {
            playPromise.catch(error => {
                console.log("Autoplay prevented. Video will start on first click.");
                // If it fails, try playing again on any user interaction
                window.addEventListener('click', () => { statusVideo.play(); }, {once: true});
            });
        }
    }

    function setStatusMode(mode) {
        if (mode === 'hidden') {
            if (statusVideo) { 
                statusVideo.pause(); 
                statusVideo.remove(); 
            }
            statusOverlay.remove();
            return;
        }
        statusOverlay.style.visibility = 'visible';
        statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
        statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
    }

    const missing = Engine.getMissingFeatures();
    if (missing.length !== 0) {
        statusNotice.innerText = 'Error: ' + missing.join(', ');
        setStatusMode('notice');
    } else {
        setStatusMode('progress');
        engine.startGame({
            'onProgress': function (current, total) {
                if (total > 0) {
                    statusProgress.value = current;
                    statusProgress.max = total;
                }
            },
        }).then(() => {
            setStatusMode('hidden');
        }).catch(err => {
            statusNotice.innerText = err;
            setStatusMode('notice');
        });
    }
}());
        </script>
    </body>
</html>
